/* ══════════════════════════════════════════════════════════
   CFG ENGINE
══════════════════════════════════════════════════════════ */

const EPS = new Set(["ε", "e", "eps", "epsilon", ""]);

function parseGrammar(text) {
  const g = {};
  for (const line of text.split("\n")) {
    const t = line.trim();
    if (!t.includes("->")) continue;
    const ai = t.indexOf("->");
    const lhs = t.slice(0, ai).trim();
    if (!lhs) continue;
    const alts = t.slice(ai + 2).split("|").map((s) => s.trim());
    g[lhs] = [...(g[lhs] || []), ...alts];
  }
  return g;
}

function tokenize(str, NTs) {
  const sorted = [...NTs].sort((a, b) => b.length - a.length);
  const res = [];
  let i = 0;
  while (i < str.length) {
    let hit = false;
    for (const nt of sorted) {
      if (str.startsWith(nt, i)) {
        res.push(nt);
        i += nt.length;
        hit = true;
        break;
      }
    }
    if (!hit) res.push(str[i++]);
  }
  return res;
}

let _id = 0;
const N = (sym, ch = []) => ({ id: _id++, sym, ch });

function buildTree(grammar, start, input) {
  const NTs = new Set(Object.keys(grammar));
  _id = 0;

  function go(sym, pos, visited) {
    if (!NTs.has(sym)) {
      if (EPS.has(sym)) return { end: pos, node: N("ε") };
      if (input.startsWith(sym, pos))
        return { end: pos + sym.length, node: N(sym) };
      return null;
    }
    const key = `${sym}:${pos}`;
    if (visited.has(key)) return null;
    const v2 = new Set(visited);
    v2.add(key);

    for (const prod of grammar[sym] || []) {
      if (EPS.has(prod)) return { end: pos, node: N(sym, [N("ε")]) };
      const syms = tokenize(prod, NTs);
      if (!syms.length) return { end: pos, node: N(sym, [N("ε")]) };
      let cur = pos;
      const kids = [];
      let ok = true;
      for (const s of syms) {
        const r = go(s, cur, v2);
        if (!r) {
          ok = false;
          break;
        }
        kids.push(r.node);
        cur = r.end;
      }
      if (ok) return { end: cur, node: N(sym, kids) };
    }
    return null;
  }

  const r = go(start, 0, new Set());
  return r?.end === input.length ? r.node : null;
}

function getSteps(tree, mode) {
  const steps = [{ syms: [tree.sym], prod: null }];
  let form = [tree];

  for (let iter = 0; iter < 100; iter++) {
    let ntIdx =
      mode === "leftmost"
        ? form.findIndex((n) => n.ch.length > 0)
        : (() => {
            for (let j = form.length - 1; j >= 0; j--)
              if (form[j].ch.length > 0) return j;
            return -1;
          })();

    if (ntIdx === -1) break;

    const node = form[ntIdx];
    const epsProd = node.ch.length === 1 && node.ch[0].sym === "ε";
    const repl = epsProd ? [] : node.ch;

    form = [
      ...form.slice(0, ntIdx),
      ...repl,
      ...form.slice(ntIdx + 1),
    ];

    steps.push({
      syms: form.map((x) => x.sym),
      prod: { idx: ntIdx, len: repl.length, nt: node.sym },
    });

    if (form.every((x) => x.ch.length === 0)) break;
  }

  return steps;
}

/* ══════════════════════════════════════════════════════════
   TREE LAYOUT
══════════════════════════════════════════════════════════ */

const R = 23, LH = 80, HG = 10;

function computeLayout(root) {
  function calcWidth(n) {
    if (!n.ch.length) {
      n.w = R * 2 + HG;
      return;
    }
    n.ch.forEach(calcWidth);
    n.w = Math.max(R * 2 + HG, n.ch.reduce((s, c) => s + c.w, 0));
  }

  function assignPos(n, x, y) {
    n.x = x + n.w / 2;
    n.y = y;
    let cx = x;
    for (const c of n.ch) {
      assignPos(c, cx, y + LH);
      cx += c.w;
    }
  }

  calcWidth(root);
  assignPos(root, 0, R + 14);

  const ns = [],
    es = [];
  function collect(n) {
    ns.push(n);
    for (const c of n.ch) {
      es.push({ x1: n.x, y1: n.y, x2: c.x, y2: c.y, key: `${n.id}-${c.id}`, pid: n.id, cid: c.id });
      collect(c);
    }
  }
  collect(root);

  const xs = ns.map((n) => n.x);
  const ys = ns.map((n) => n.y);
  const minX = Math.min(...xs) - R - 18;
  const maxX = Math.max(...xs) + R + 18;
  const maxY = Math.max(...ys) + R + 28;
  const ox = -minX;

  return { ns, es, W: maxX - minX, H: maxY, ox };
}

/* ══════════════════════════════════════════════════════════
   PARSE TREE SVG
══════════════════════════════════════════════════════════ */

function TreeSVG({ layout: { ns, es, W, H, ox } }) {
  return (
    <svg
      width={W}
      height={H}
      viewBox={`0 0 ${W} ${H}`}
      style={{ fontFamily: "JetBrains Mono, monospace", overflow: "visible" }}
    >
      <defs>
        <filter id="gnt" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="5" result="b" />
          <feMerge>
            <feMergeNode in="b" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <filter id="gt" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="4" result="b" />
          <feMerge>
            <feMergeNode in="b" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <radialGradient id="gnt-fill" cx="50%" cy="35%" r="65%">
          <stop offset="0%" stopColor="rgba(129,140,248,0.32)" />
          <stop offset="100%" stopColor="rgba(99,102,241,0.1)" />
        </radialGradient>
        <radialGradient id="gt-fill" cx="50%" cy="30%" r="65%">
          <stop offset="0%" stopColor="rgba(34,211,238,0.28)" />
          <stop offset="100%" stopColor="rgba(34,211,238,0.07)" />
        </radialGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 2L8 5L2 8" fill="none" stroke="rgba(99,102,241,0.5)"
            strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </marker>
      </defs>

      {/* Grid dots background */}
      {ns.length > 0 && (
        <pattern id="dp" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="12" cy="12" r="0.6" fill="rgba(99,102,241,0.12)" />
        </pattern>
      )}

      {/* Edges */}
      {es.map((e, i) => (
        <line
          key={e.key}
          x1={e.x1 + ox} y1={e.y1}
          x2={e.x2 + ox} y2={e.y2}
          stroke="rgba(99,102,241,0.35)"
          strokeWidth="1.5"
          strokeDasharray={`${Math.hypot(e.x2-e.x1, e.y2-e.y1)} ${Math.hypot(e.x2-e.x1, e.y2-e.y1)}`}
          strokeDashoffset={Math.hypot(e.x2-e.x1, e.y2-e.y1)}
          style={{
            animation: `ei 0.4s ease ${i * 30 + 100}ms forwards`,
            strokeDashoffset: 0,
            opacity: 0
          }}
        />
      ))}

      {/* Nodes */}
      {ns.map((n) => {
        const x = n.x + ox;
        const isNT = n.ch.length > 0;
        const isEp = n.sym === "ε";
        const delay = `${n.id * 28}ms`;

        return (
          <g
            key={n.id}
            style={{
              animation: `ni 0.35s cubic-bezier(0.34,1.56,0.64,1) ${delay} forwards`,
              opacity: 0,
              transformOrigin: `${x}px ${n.y}px`,
            }}
          >
            {isNT ? (
              <>
                {/* Outer glow ring */}
                <circle cx={x} cy={n.y} r={R + 4}
                  fill="none" stroke="rgba(99,102,241,0.12)" strokeWidth="1" />
                {/* Main circle */}
                <circle cx={x} cy={n.y} r={R}
                  fill="url(#gnt-fill)"
                  stroke="#6366F1"
                  strokeWidth="1.5"
                  filter="url(#gnt)" />
                {/* Inner accent ring */}
                <circle cx={x} cy={n.y} r={R - 5}
                  fill="none"
                  stroke="rgba(129,140,248,0.2)"
                  strokeWidth="0.5" />
              </>
            ) : isEp ? (
              <rect
                x={x - R} y={n.y - R}
                width={R * 2} height={R * 2} rx={5}
                fill="rgba(100,116,139,0.08)"
                stroke="#475569"
                strokeWidth="1"
                strokeDasharray="3 2.5"
              />
            ) : (
              <>
                <rect
                  x={x - R} y={n.y - R}
                  width={R * 2} height={R * 2} rx={5}
                  fill="url(#gt-fill)"
                  stroke="#22D3EE"
                  strokeWidth="1.5"
                  filter="url(#gt)" />
                {/* Corner accents */}
                <line x1={x - R + 1} y1={n.y - R + 6} x2={x - R + 1} y2={n.y - R + 1} stroke="rgba(34,211,238,0.5)" strokeWidth="1.5" strokeLinecap="round" />
                <line x1={x - R + 1} y1={n.y - R + 1} x2={x - R + 6} y2={n.y - R + 1} stroke="rgba(34,211,238,0.5)" strokeWidth="1.5" strokeLinecap="round" />
                <line x1={x + R - 1} y1={n.y + R - 6} x2={x + R - 1} y2={n.y + R - 1} stroke="rgba(34,211,238,0.35)" strokeWidth="1" strokeLinecap="round" />
                <line x1={x + R - 1} y1={n.y + R - 1} x2={x + R - 6} y2={n.y + R - 1} stroke="rgba(34,211,238,0.35)" strokeWidth="1" strokeLinecap="round" />
              </>
            )}
            <text
              x={x} y={n.y}
              textAnchor="middle"
              dominantBaseline="middle"
              fontSize={n.sym.length > 2 ? 9 : 12}
              fontWeight={isNT ? "600" : "400"}
              fill={isNT ? "#818CF8" : isEp ? "#64748B" : "#22D3EE"}
              fontFamily="'JetBrains Mono', monospace"
              style={{ userSelect: "none" }}
            >
              {n.sym}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════
   DERIVATION STEP ROW
══════════════════════════════════════════════════════════ */

function StepRow({ step, idx, NTs }) {
  const { syms, prod } = step;

  return (
    <div className="step" style={{ animationDelay: `${idx * 35}ms` }}>
      <span className="snum">{idx}</span>
      <span className="sarr" style={{ color: idx === 0 ? "var(--mt)" : "var(--ind)" }}>
        {idx === 0 ? "⊢" : "⟹"}
      </span>
      <div className="sform">
        {syms.length === 0 ? (
          <span className="sym sE">ε</span>
        ) : (
          syms.map((sym, j) => {
            const hi = prod && j >= prod.idx && j < prod.idx + prod.len;
            const isNT = NTs.has(sym);
            if (sym === "ε") return <span key={j} className="sym sE">ε</span>;
            if (hi) return <span key={j} className={`sym ${isNT ? "sNTh" : "sTh"}`}>{sym}</span>;
            return <span key={j} className={`sym ${isNT ? "sNT" : "sT"}`}>{sym}</span>;
          })
        )}
      </div>
    </div>
  );
}

  },

/* ══════════════════════════════════════════════════════════
   MAIN APPLICATION
══════════════════════════════════════════════════════════ */

export default function App() {
  const [grammarTxt, setGrammarTxt] = useState("S -> aSb | ε");
  const [startSym, setStartSym] = useState("S");
  const [inputStr, setInputStr] = useState("aabb");
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [derMode, setDerMode] = useState("leftmost");
  const [view, setView] = useState("derivation");
  const [animKey, setAnimKey] = useState(0);
  const cssRef = useRef(null);

  useEffect(() => {
    if (!cssRef.current) {
      const el = document.createElement("style");
      el.textContent = CSS;
      document.head.appendChild(el);
      cssRef.current = el;
    }
    return () => cssRef.current?.remove();
  }, []);

  const analyze = useCallback(() => {
    setError(null);
    setResult(null);

    const g = parseGrammar(grammarTxt);
    const symbols = Object.keys(g);

    if (!symbols.length) {
      setError("No valid grammar rules found. Use format: S -> aSb | ε");
      return;
    }
    if (!g[startSym]) {
      setError(`Start symbol '${startSym}' not defined in grammar.`);
      return;
    }

    const tree = buildTree(g, startSym, inputStr);

    if (!tree) {
      const display = inputStr === "" ? "ε (empty string)" : `"${inputStr}"`;
      setError(`${display} is NOT in L(G). No valid derivation exists from ${startSym}.`);
      return;
    }

    const NTs = new Set(Object.keys(g));
    const lm = getSteps(tree, "leftmost");
    const rm = getSteps(tree, "rightmost");
    const layout = computeLayout(tree);

    setResult({ lm, rm, layout, NTs });
    setAnimKey((k) => k + 1);
  }, [grammarTxt, startSym, inputStr]);

  const loadExample = useCallback((ex) => {
    setGrammarTxt(ex.grammar);
    setStartSym(ex.start);
    setInputStr(ex.input);
    setResult(null);
    setError(null);
  }, []);

  const steps = result
    ? derMode === "leftmost"
      ? result.lm
      : result.rm
    : [];

  return (
    <div className="app">
      {/* ── Header ── */}
      <div className="hdr">
        <div className="logo">⬡</div>
        <div>
          <div className="hdr-title">CFG // DERIVE</div>
          <div className="hdr-sub">
            Context-Free Grammar Derivation Engine · v2.4.1
          </div>
        </div>
        <div className="hdr-right">
          <div className="stat-dot" title="Parser ready" />
          <div className="badge">CYBERPUNK BUILD</div>
        </div>
      </div>

      {/* ── Main Layout ── */}
      <div className="layout">
        {/* ── Sidebar ── */}
        <div className="sb">
          {/* Grammar definition */}
          <div className="sb-sec">
            <div className="sec-head">Grammar Definition</div>

            <div className="fwrap">
              <div className="flabel">Production Rules (use | for alternatives, ε or e for epsilon)</div>
              <textarea
                rows={5}
                value={grammarTxt}
                onChange={(e) => {
                  setGrammarTxt(e.target.value);
                  setResult(null);
                  setError(null);
                }}
                placeholder={"S -> aSb | ε\nA -> aA | a"}
                spellCheck={false}
              />
            </div>

            <div className="row2">
              <div className="fwrap" style={{ marginBottom: 0 }}>
                <div className="flabel">Start Symbol</div>
                <input
                  type="text"
                  value={startSym}
                  maxLength={8}
                  onChange={(e) => {
                    setStartSym(e.target.value.trim());
                    setResult(null);
                    setError(null);
                  }}
                />
              </div>
              <div className="fwrap" style={{ marginBottom: 0 }}>
                <div className="flabel">Input String</div>
                <input
                  type="text"
                  value={inputStr}
                  onChange={(e) => {
                    setInputStr(e.target.value);
                    setResult(null);
                    setError(null);
                  }}
                  placeholder="(empty for ε)"
                />
              </div>
            </div>
          </div>

          {/* Analyze button */}
          <div className="sb-sec">
            <button className="btn-run" onClick={analyze}>
              ↯ &nbsp;Analyze Grammar
            </button>
          </div>

          {/* Status */}
          {(result || error) && (
            <div className="sb-sec">
              {result && (
                <div className="ok-box">
                  <span>✓</span>
                  <span>
                    Accepted &nbsp;·&nbsp; {result.lm.length - 1} step
                    {result.lm.length !== 2 ? "s" : ""} &nbsp;·&nbsp;{" "}
                    {result.layout.ns.length} nodes
                  </span>
                </div>
              )}
              {error && <div className="err-box">✗ &nbsp;{error}</div>}
            </div>
          )}

          {/* Examples */}
          <div className="sb-sec" style={{ flex: 1 }}>
            <div className="sec-head">Example Grammars</div>
            <div className="ex-grid">
              {EXAMPLES.map((ex) => (
                <button
                  key={ex.name}
                  className="ex-btn"
                  onClick={() => loadExample(ex)}
                >
                  <span>{ex.name}</span>
                  <span className="ex-tag">{ex.short}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Legend */}
          <div className="sb-sec">
            <div className="sec-head" style={{ marginBottom: 8 }}>
              Symbol Legend
            </div>
            <div className="legend">
              <div>
                <span className="lg-nt">◉ NT</span> — Non-terminal (circle node)
              </div>
              <div>
                <span className="lg-t">◼ T</span> &nbsp;— Terminal (square node)
              </div>
              <div>
                <span className="lg-ep">◻ ε</span> &nbsp;— Epsilon / empty string
              </div>
            </div>
            <div
              style={{
                marginTop: 10,
                fontFamily: "var(--mono)",
                fontSize: 9.5,
                color: "rgba(100,116,139,0.55)",
                lineHeight: 1.7,
              }}
            >
              Note: Left recursion is not supported.
              <br />
              Max derivation depth: 100 steps.
            </div>
          </div>
        </div>

        {/* ── Content Pane ── */}
        <div className="content">
          {!result && !error && (
            <div className="empty">
              <div className="eico">⟨ / ⟩</div>
              <div className="etxt">
                Define a context-free grammar and input string,
                <br />
                then press{" "}
                <span style={{ color: "var(--indB)" }}>↯ Analyze</span> to
                generate the derivation.
                <br />
                <span style={{ color: "var(--ind)", fontSize: 10.5 }}>
                  — Both leftmost and rightmost derivations are computed —
                </span>
              </div>
            </div>
          )}

          {error && !result && (
            <div className="empty">
              <div
                className="eico"
                style={{ color: "var(--rd)", fontSize: 40 }}
              >
                ✗ REJECT
              </div>
              <div className="etxt" style={{ color: "var(--rd)", opacity: 1 }}>
                {error}
              </div>
            </div>
          )}

          {result && (
            <>
              {/* Tabs */}
              <div className="tabs">
                <button
                  className={`tab ${view === "derivation" ? "on" : ""}`}
                  onClick={() => setView("derivation")}
                >
                  ⟹ &nbsp;Derivation Sequence
                </button>
                <button
                  className={`tab ${view === "tree" ? "on" : ""}`}
                  onClick={() => setView("tree")}
                >
                  ⊤ &nbsp;Parse Tree
                </button>
              </div>

              {/* Derivation view */}
              {view === "derivation" && (
                <>
                  <div className="modebar">
                    <span className="mlab">Expand:</span>
                    <button
                      className={`mbtn ${derMode === "leftmost" ? "on" : ""}`}
                      onClick={() => {
                        setDerMode("leftmost");
                        setAnimKey((k) => k + 1);
                      }}
                    >
                      ◄ Leftmost
                    </button>
                    <button
                      className={`mbtn ${derMode === "rightmost" ? "on" : ""}`}
                      onClick={() => {
                        setDerMode("rightmost");
                        setAnimKey((k) => k + 1);
                      }}
                      style={{ marginLeft: 4 }}
                    >
                      Rightmost ►
                    </button>
                    <span className="mcount">
                      {steps.length - 1} derivation step
                      {steps.length !== 2 ? "s" : ""}
                    </span>
                  </div>
                  <div className="dscroll">
                    {steps.map((step, i) => (
                      <StepRow
                        key={`${derMode}-${animKey}-${i}`}
                        step={step}
                        idx={i}
                        NTs={result.NTs}
                      />
                    ))}
                    {/* Final acceptance marker */}
                    <div
                      style={{
                        marginTop: 16,
                        padding: "8px 10px",
                        border: "1px solid rgba(16,185,129,0.25)",
                        borderRadius: 5,
                        background: "rgba(16,185,129,0.06)",
                        fontFamily: "var(--mono)",
                        fontSize: 10.5,
                        color: "var(--gr)",
                        display: "flex",
                        alignItems: "center",
                        gap: 8,
                      }}
                    >
                      <span>✓</span>
                      <span>
                        String{" "}
                        <span
                          style={{ color: "var(--cy)" }}
                        >{`"${inputStr || "ε"}"`}</span>{" "}
                        accepted ·{" "}
                        {derMode === "leftmost" ? "Leftmost" : "Rightmost"}{" "}
                        derivation complete
                      </span>
                    </div>
                  </div>
                </>
              )}

              {/* Tree view */}
              {view === "tree" && (
                <div className="tscroll" key={`tree-${animKey}`}>
                  <TreeSVG layout={result.layout} />
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

        // IMPORTANT: Delete the first line that says "import { useState... }" 
        // from what you paste, because we already defined them above.

        // ----------------------------------------------------------------------

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
