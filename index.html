        /* ... existing styles from cfg-parser.jsx ... */
        `;

        function parseGrammar(text) {
            const g = {};
            for (const line of text.split("\n")) {
                const t = line.trim();
                if (!t.includes("->")) continue;
                const ai = t.indexOf("->");
                const lhs = t.slice(0, ai).trim();
                const alts = t.slice(ai + 2).split("|").map((s) => s.trim());
                g[lhs] = [...(g[lhs] || []), ...alts];
            }
            return g;
        }

        // ... [Rest of the Tree/Logic from your file] ...

            return (
