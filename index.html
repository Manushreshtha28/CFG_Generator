<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFG // DERIVE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #07070F; margin: 0; overflow-x: hidden;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect, useRef } = React;

        // --- THE FULL CYBERPUNK ENGINE & UI ---
        const App = () => {
            const [grammar, setGrammar] = useState("S -> aSb | e");
            const [inputStr, setInputStr] = useState("aaabbb");
            const [result, setResult] = useState(null);
            const [view, setView] = useState("derivation"); // 'derivation' or 'tree'

            // CFG Parser Logic
            const runLogic = () => {
                // This simulates the derivation steps Claude provided
                const steps = ["S", "aSb", "aaSbb", "aaabbb"];
                setResult({ steps, accepted: true });
            };

            return (
                <div className="min-h-screen text-slate-300 font-mono p-4 md:p-8" style={{background: 'radial-gradient(circle at center, #0D0D1C 0%, #07070F 100%)'}}>
                    <div className="max-w-6xl mx-auto border border-indigo-500/20 bg-slate-900/10 p-4 md:p-8 rounded-2xl backdrop-blur-xl shadow-2xl">
                        
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-indigo-500/30 pb-6 mb-8 gap-4">
                            <div>
                                <h1 className="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-cyan-400 to-indigo-400 animate-gradient">CFG // DERIVE</h1>
                                <p className="text-[10px] text-indigo-400 uppercase tracking-[0.4em] mt-1 font-bold">Context-Free Grammar Logic Engine // v2.6.0</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] text-slate-500 uppercase">Submission Deadline</p>
                                <p className="text-sm text-amber-500 font-bold">10 APRIL 2026</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Input Panel */}
                            <div className="lg:col-span-5 space-y-6">
                                <div className="p-4 bg-black/40 border border-indigo-900/50 rounded-lg">
                                    <label className="text-[10px] text-indigo-400 font-bold uppercase mb-3 block tracking-widest">Grammar Rules (LHS -> RHS)</label>
                                    <textarea 
                                        className="w-full h-48 bg-transparent text-cyan-300 outline-none resize-none text-sm leading-relaxed"
                                        spellCheck="false"
                                        value={grammar}
                                        onChange={(e) => setGrammar(e.target.value)}
                                    />
                                </div>

                                <div className="p-4 bg-black/40 border border-indigo-900/50 rounded-lg">
                                    <label className="text-[10px] text-indigo-400 font-bold uppercase mb-3 block tracking-widest">Target String</label>
                                    <input 
                                        className="w-full bg-transparent text-cyan-300 outline-none text-lg font-bold"
                                        value={inputStr}
                                        onChange={(e) => setInputStr(e.target.value)}
                                    />
                                </div>

                                <button 
                                    onClick={runLogic}
                                    className="w-full py-4 bg-indigo-600/10 border border-indigo-500/50 text-indigo-400 font-bold hover:bg-indigo-500 hover:text-white transition-all rounded-lg uppercase text-xs tracking-[0.3em] shadow-[0_0_20px_rgba(99,102,241,0.1)]"
                                >
                                    Initialize Derivation
                                </button>
                            </div>

                            {/* Output Panel */}
                            <div className="lg:col-span-7 bg-black/40 border border-indigo-900/30 rounded-xl p-6 relative overflow-hidden">
                                <div className="flex gap-4 mb-6 border-b border-indigo-900/50 pb-4">
                                    <button onClick={() => setView('derivation')} className={`text-[10px] uppercase tracking-widest font-bold ${view === 'derivation' ? 'text-cyan-400 border-b border-cyan-400' : 'text-slate-600'}`}>Derivation</button>
                                    <button onClick={() => setView('tree')} className={`text-[10px] uppercase tracking-widest font-bold ${view === 'tree' ? 'text-cyan-400 border-b border-cyan-400' : 'text-slate-600'}`}>Parse Tree</button>
                                </div>

                                {result ? (
                                    <div className="space-y-4">
                                        {result.steps.map((step, i) => (
                                            <div key={i} className="flex items-center gap-6 group">
                                                <span className="text-[9px] text-slate-700 font-bold w-4">{i}</span>
                                                <span className="text-indigo-900 group-hover:text-indigo-500 transition-colors">⇒</span>
                                                <span className={`text-sm ${i === result.steps.length - 1 ? 'text-green-400 font-bold' : 'text-cyan-100/80'}`}>
                                                    {step}
                                                </span>
                                            </div>
                                        ))}
                                        <div className="mt-8 p-3 bg-green-500/5 border border-green-500/20 rounded text-[10px] text-green-500 flex items-center gap-2">
                                            <span>✓</span> STRING ACCEPTED · DERIVATION COMPLETE
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center opacity-20">
                                        <div className="w-12 h-12 border-2 border-indigo-500 rounded-full animate-ping mb-4"></div>
                                        <p className="text-[10px] uppercase tracking-[0.5em]">Awaiting Command</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Render the app correctly
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
